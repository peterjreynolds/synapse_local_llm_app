name: Build Synapse AI APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      APK_PATH: app/build/outputs/apk/synapse/Synapse-AI.apk
      APK_BRANCH: apk-latest
      RELEASE_TAG: synapse-ai-debug-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --install \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "platform-tools" \
            "cmake;3.31.6" \
            "ndk;29.0.13113456"

      - name: Restore stable debug signing key
        shell: bash
        env:
          SYNAPSE_DEBUG_KEYSTORE_B64: ${{ secrets.SYNAPSE_DEBUG_KEYSTORE_B64 }}
        run: |
          if [ -n "$SYNAPSE_DEBUG_KEYSTORE_B64" ]; then
            mkdir -p "$HOME/.android"
            printf '%s' "$SYNAPSE_DEBUG_KEYSTORE_B64" | base64 --decode > "$HOME/.android/debug.keystore"
            chmod 600 "$HOME/.android/debug.keystore"
            echo "Using stable debug signing key from SYNAPSE_DEBUG_KEYSTORE_B64."
          else
            echo "SYNAPSE_DEBUG_KEYSTORE_B64 is not set. Android may require uninstall/reinstall between APKs."
          fi

      - name: Run unit tests
        shell: bash
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Run ktlint
        shell: bash
        run: ./gradlew ktlintCheck --stacktrace

      - name: Run Android lint
        shell: bash
        run: ./gradlew lintDebug --stacktrace

      - name: Assemble debug APK
        shell: bash
        run: ./gradlew assembleDebug --stacktrace

      - name: Verify APK output
        shell: bash
        run: |
          test -f "$APK_PATH"
          ls -lh "$APK_PATH"
          sha256sum "$APK_PATH" | tee apk-sha256.txt

      - name: Publish single-APK branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          publish_root="$(mktemp -d)"
          mkdir -p "$publish_root/APK"
          cp "$APK_PATH" "$publish_root/APK/Synapse-AI.apk"
          cp apk-sha256.txt "$publish_root/APK/Synapse-AI.apk.sha256"
          cat > "$publish_root/APK/README.md" <<'EOF'
          # Synapse AI APK

          `Synapse-AI.apk` is the latest debug APK built from `main`.

          This branch is force-replaced by GitHub Actions so it exposes one
          canonical APK without retaining old APK commits on the branch.
          EOF

          auth_header="$(git config --local --get http.https://github.com/.extraheader)"
          git -C "$publish_root" init
          git -C "$publish_root" checkout -b "$APK_BRANCH"
          git -C "$publish_root" config user.name "github-actions[bot]"
          git -C "$publish_root" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$publish_root" add APK/README.md APK/Synapse-AI.apk APK/Synapse-AI.apk.sha256
          git -C "$publish_root" commit -m "publish latest Synapse AI APK"
          git -C "$publish_root" remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git -C "$publish_root" -c "http.https://github.com/.extraheader=$auth_header" push --force origin "$APK_BRANCH"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Synapse-AI
          path: ${{ env.APK_PATH }}
          if-no-files-found: error
          retention-days: 30

      - name: Publish rolling debug release
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release delete "$RELEASE_TAG" --cleanup-tag --yes
          fi
          version_code=$((2000 + GITHUB_RUN_NUMBER))
          apk_sha256="$(cut -d ' ' -f 1 apk-sha256.txt)"
          release_notes="Latest automated debug APK from commit $GITHUB_SHA. "
          release_notes+="Version code: $version_code. SHA-256: $apk_sha256. "
          release_notes+="This rolling release is recreated after every successful main build "
          release_notes+="so the Releases page points at the newest APK."

          gh release create "$RELEASE_TAG" "$APK_PATH#Synapse-AI.apk" \
            --target "$GITHUB_SHA" \
            --title "Synapse AI Debug APK" \
            --notes "$release_notes" \
            --latest
